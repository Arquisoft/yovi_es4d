version: "3.9"

services:
  mongodb:
    container_name: mongodb_es4d
    image: mongo:latest
    profiles: ["dev", "prod"]
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - es4d-net

  authservice:
    container_name: authservice_es4d
    build: ./users/authservice
    profiles: ["dev", "prod"]
    env_file:
      - .env
    depends_on:
      - mongodb
    ports:
      - "8002:8002"
    networks:
      - es4d-net
    environment:
      MONGODB_URI: mongodb://mongodb:27017/authdb
      JWT_SECRET: mi_clave_secreta

  userservice:
    container_name: userservice_es4d
    build: ./users/userservice
    profiles: ["dev", "prod"]
    depends_on:
      - mongodb
    ports:
      - "8001:8001"
    networks:
      - es4d-net
    environment:
      MONGODB_URI: mongodb://mongodb:27017/usersdb

  gamey:
    container_name: gamey_es4d
    build: ./gamey
    profiles: ["dev", "prod"]
    ports:
      - "4000:4000"
    networks:
      - es4d-net
    environment:
      PORT: 4000

  game:
    container_name: game_es4d
    build: ./game
    profiles: ["dev", "prod"]
    ports:
      - "8003:8003"
    networks:
      - es4d-net
    environment:
      PORT: 8003
      MONGODB_URI: mongodb://mongodb:27017/gamedb
      GAMEY_BOT_URL: http://gamey:4000
      USERS_URL: http://userservice:8001
    depends_on:
      - userservice
      - gamey

  gateway:
    container_name: gateway_es4d
    build: ./gateway
    profiles: ["dev", "prod"]
    depends_on:
      - authservice
      - userservice
      - game
    ports:
      - "8000:8000"
    networks:
      - es4d-net
    environment:
      AUTH_SERVICE_URL: http://authservice:8002
      USER_SERVICE_URL: http://userservice:8001
      GAME_SERVICE_URL: http://game:8003
      TOKEN_SECRET_KEY: mi_clave_secreta

  webapp:
    container_name: webapp_es4d
    build: ./webapp
    profiles: ["dev", "prod"]
    depends_on:
      - gateway
    ports:
      - "5173:80"
    networks:
      - es4d-net
    environment:
      VITE_API_URL: http://gateway:8000

  prometheus:
    image: prom/prometheus
    container_name: prometheus_es4d
    profiles: ["dev"]
    networks:
      - es4d-net
    volumes:
      - ./gateway/monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - gateway

  grafana:
    image: grafana/grafana
    container_name: grafana_es4d
    profiles: ["dev"]
    networks:
      - es4d-net
    volumes:
      - grafana_data:/var/lib/grafana
      - ./gateway/monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SERVER_HTTP_PORT=9091
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    ports:
      - "9091:9091"
    depends_on:
      - prometheus

volumes:
  mongodb_data:
  prometheus_data:
  grafana_data:

networks:
  es4d-net:
    driver: bridge