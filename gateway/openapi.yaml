openapi: 3.0.0
info:
  title: Gatewayservice API
  description: Gateway OpenAPI specification.
  version: 0.2.0
servers:
  - url: http://localhost:8000
    description: Development server
  - url: http://wichat-es4a.es:8000
    description: Production server
paths:
  /adduser:
    post:
      summary: Add a new user to the database.
      operationId: addUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: User ID that will be unique.
                  example: student
                password:
                  type: string
                  description: User password that must be at least 8 characters long and contain at least one uppercase letter,one number and no spaces.
                  example: Password123
      responses:
        '200':
          description: User added successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  username:
                    type: string
                    description: User ID
                    example: student
                  password:
                    type: string
                    description: Hashed password
                    example: $2b$10$ZKdNYLWFQxzt5Rei/YTc/OsZNi12YiWz30JeUFHNdAt7MyfmkTuvC
                  _id:
                    type: string
                    description: Identification
                    example: 65f756db3fa22d227a4b7c7d
                  createdAt:
                    type: string
                    description: Creation date.
                    example: '2024-03-17T20:47:23.935Z'
                  ___v:
                    type: integer
                    example: '0'                                        
        '400':
          description: Failed to add user due to missing fields, not secure password or invalid username format.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      error:
                        type: string
                        description: Missing field error.
                        example: "Missing required field: password"
                  - type: object
                    properties:
                      error:
                        type: string
                        description: Password security error.
                        example: "Password error content: notSecurePassword"
                  - type: object
                    properties:
                      error:
                        type: string
                        description: Username format error.
                        example: "Invalid username format"
        '409':
          description: Username already exists.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error information.
                    example: Username already exists
  /health:
    get:
      summary: Check the health status of the service.
      operationId: checkHealth
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Health status.
                    example: OK
  /login:
    post:
      summary: Log in to the system.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: Email of the user.
                  example: user@example.com
                password:
                  type: string
                  description: User password.
                  example: Password123
      responses:
        '200':
          description: Login successful. Returns user token, username, and creation date.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT token for authentication.
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c
                  username:
                    type: string
                    description: Username.
                    example: student
                  createdAt:
                    type: string
                    description: Creation date.
                    example: '2024-03-17T20:47:23.935Z'
                  id:
                    type: string
                    description: User ID.
                    example: 65f756db3fa22d227a4b7c7d
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Shows the error info..
                    example: Invalid credentials
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error information.
                    example: Internal Server Error
        '429':
          description: Too many requests.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error information.
                    example: Too many requests, please try again later
                  
  /api/user/editUser:
    post:
      summary: Change user password.
      operationId: changeUserPassword
      security:
        - bearerAuth: []  # Requiere autenticación con JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  description: Current password of the user.
                  example: Password123
                newPassword:
                  type: string
                  description: New password.
                  example: newSecurePass123
      responses:
        '200':
          description: Password updated successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: string
                    example: true
        '404':
          description: User not found.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: User not found
        '401':
          description: Unauthorized - Incorrect Password.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Incorrent current password
        '400':
          description: Unauthorized - Missing or invalid token.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Cast to ObjectId failed for value \"guestXXXXXXXXXXXX\" (type string) at path \"_id\" for model \"User\"

  /api/game/new:
    post:
      summary: Configure a new game with selected topics and language
      operationId: configureNewGame
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - topics
                - lang
              properties:
                topics:
                  type: array
                  items:
                    type: string
                  example: ["art", "history"]
                lang:
                  type: string
                  enum: [es, en]
                  example: es
      responses:
        '200':
          description: Game configured successfully. Returns a cacheId to be used in next requests.
          content:
            application/json:
              schema:
                type: object
                properties:
                  cacheId:
                    type: string
                    example: abc123def456ghi789
        '400':
          description: Bad request - Invalid topics or language.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid topics or language
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Internal Server Error






  /play:
    get:
      summary: Request a bot move for a given board position (public, no auth required).
      description: >
        Accepts a board position in YEN (Y Exchange Notation) format and returns the
        move chosen by the specified bot. Used for inter-implementation competitions.
        The position parameter must be a URL-encoded JSON string.
      operationId: play
      parameters:
        - in: query
          name: position
          required: true
          schema:
            type: string
          description: >
            Board position in YEN JSON format. Fields: size (integer), turn (0 or 1),
            players (array of two single-char strings, e.g. ["B","R"]),
            layout (string with rows separated by '/' and cells as player symbol or '.').
          example: '{"size":3,"turn":0,"players":["B","R"],"layout":"./B./..."}'
        - in: query
          name: bot_id
          required: false
          schema:
            type: string
            enum: [random_bot, intermediate_bot, hard_bot]
            default: hard_bot
          description: >
            Bot identifier to use for the move. Defaults to hard_bot if not specified.
      responses:
        '200':
          description: Bot move or action.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: A placement move with coordinates.
                    properties:
                      coords:
                        type: object
                        properties:
                          x:
                            type: integer
                            example: 1
                          y:
                            type: integer
                            example: 1
                          z:
                            type: integer
                            example: 0
                    example: {"coords":{"x":1,"y":1,"z":0}}
                  - type: object
                    description: A game action (e.g. resign when no moves available).
                    properties:
                      action:
                        type: string
                        example: resign
                    example: {"action":"resign"}
        '400':
          description: Missing or invalid position parameter.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: El parámetro position es obligatorio
        '500':
          description: Internal bot error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Error procesando jugada del bot

  /api/game/bot-modes:
    get:
      summary: Get available bot difficulty modes (public, no auth required).
      operationId: getBotModes
      responses:
        '200':
          description: List of available bot identifiers.
          content:
            application/json:
              schema:
                type: object
                properties:
                  botModes:
                    type: array
                    items:
                      type: string
                    example: ["random_bot", "intermediate_bot", "hard_bot"]
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Error obteniendo modos de bot

  /api/game/start:
    post:
      summary: Start a new game session.
      operationId: startGame
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - gameMode
              properties:
                gameMode:
                  type: string
                  enum: [vsBot, multiplayer, online]
                  example: vsBot
                botMode:
                  type: string
                  enum: [random_bot, intermediate_bot, hard_bot]
                  example: random_bot
                boardSize:
                  type: integer
                  enum: [8, 11, 15, 19]
                  default: 11
                  example: 11
      responses:
        '200':
          description: Game started successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  gameId:
                    type: string
                    example: game_1713000000000_abc123
                  board:
                    type: array
                    items:
                      type: object
                  players:
                    type: array
                    items:
                      type: object
                  turn:
                    type: string
                    example: j1
                  status:
                    type: string
                    example: active
        '401':
          description: Unauthorized.
        '500':
          description: Internal server error.

  /api/game/{gameId}/validateMove:
    post:
      summary: Validate and apply a player move.
      operationId: validateMove
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: gameId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - move
              properties:
                move:
                  type: string
                  description: Cell position in (x,y,z) format.
                  example: (1,1,0)
      responses:
        '200':
          description: Move result.
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  winner:
                    type: string
                    nullable: true
                    example: j1
                  status:
                    type: string
                    example: active
        '400':
          description: Invalid move.
        '401':
          description: Unauthorized.
        '404':
          description: Game not found.

  /api/game/history:
    get:
      summary: Get the authenticated user's game history.
      operationId: getHistory
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of finished games for the user.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    gameId:
                      type: string
                    gameMode:
                      type: string
                    boardSize:
                      type: integer
                    winner:
                      type: string
                    createdAt:
                      type: string
                      format: date-time
                    finishedAt:
                      type: string
                      format: date-time
        '401':
          description: Unauthorized.
        '500':
          description: Internal server error.

# This is the security scheme for JWT authentication. It defines how the authentication should be done in the API.
# The bearerAuth scheme is used to indicate that the API uses JWT (JSON Web Token) tokens for authentication.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT