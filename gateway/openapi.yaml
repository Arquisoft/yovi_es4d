openapi: 3.0.0
info:
  title: Gatewayservice API
  description: Gateway OpenAPI specification.
  version: 0.2.0
servers:
  - url: https://localhost:8000
    description: Development server
paths:
  /adduser:
    post:
      summary: Add a new user to the database.
      operationId: addUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - email
                - password
              properties:
                username:
                  type: string
                  description: Unique display name for the user.
                  example: student
                email:
                  type: string
                  description: Email address of the user (unique).
                  example: student@example.com
                password:
                  type: string
                  description: Password (min 8 chars, at least one uppercase letter and one number, no spaces).
                  example: Password123
      responses:
        '201':
          description: User created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User created
                  id:
                    type: string
                    description: ID of the newly created user.
                    example: 65f756db3fa22d227a4b7c7d
        '400':
          description: Failed to add user due to missing fields or password not meeting requirements.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: "Password does not meet requirements"
        '409':
          description: Email or username already exists.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Email or username already exists
  /health:
    get:
      summary: Check the health status of the service.
      operationId: checkHealth
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Health status.
                    example: OK
  /login:
    post:
      summary: Log in to the system.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  description: Email of the user.
                  example: user@example.com
                password:
                  type: string
                  description: User password.
                  example: Password123
      responses:
        '200':
          description: Login successful. Returns user token, username, and creation date.
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: JWT token for authentication.
                    example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiaWF0IjoxNTE2MjM5MDIyfQ.SflKxwRJSMeKKF2QT4fwpMeJf36POk6yJV_adQssw5c
                  username:
                    type: string
                    description: Username.
                    example: student
                  createdAt:
                    type: string
                    description: Creation date.
                    example: '2024-03-17T20:47:23.935Z'
                  id:
                    type: string
                    description: User ID.
                    example: 65f756db3fa22d227a4b7c7d
        '401':
          description: Invalid credentials.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Shows the error info..
                    example: Invalid credentials
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error information.
                    example: Internal Server Error
        '429':
          description: Too many requests.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    description: Error information.
                    example: Too many requests, please try again later
                  






  /play:
    get:
      summary: Request a bot move for a given board position (public, no auth required).
      description: >
        Accepts a board position in YEN (Y Exchange Notation) format and returns the
        move chosen by the specified bot. Used for inter-implementation competitions.
        The position parameter must be a URL-encoded JSON string.
      operationId: play
      parameters:
        - in: query
          name: position
          required: true
          schema:
            type: string
          description: >
            Board position in YEN JSON format. Fields: size (integer), turn (0 or 1),
            players (array of two single-char strings, e.g. ["B","R"]),
            layout (string with rows separated by '/' and cells as player symbol or '.').
          example: '{"size":3,"turn":0,"players":["B","R"],"layout":"./B./..."}'
        - in: query
          name: bot_id
          required: false
          schema:
            type: string
            enum: [random_bot, intermediate_bot, hard_bot]
            default: hard_bot
          description: >
            Bot identifier to use for the move. Defaults to hard_bot if not specified.
      responses:
        '200':
          description: Bot move or action.
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    description: A placement move with coordinates.
                    properties:
                      coords:
                        type: object
                        properties:
                          x:
                            type: integer
                            example: 1
                          y:
                            type: integer
                            example: 1
                          z:
                            type: integer
                            example: 0
                    example: {"coords":{"x":1,"y":1,"z":0}}
                  - type: object
                    description: A game action (e.g. resign when no moves available).
                    properties:
                      action:
                        type: string
                        example: resign
                    example: {"action":"resign"}
        '400':
          description: Missing or invalid position parameter.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: El parámetro position es obligatorio
        '500':
          description: Internal bot error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Error procesando jugada del bot

  /api/game/bot-modes:
    get:
      summary: Get available bot difficulty modes (public, no auth required).
      operationId: getBotModes
      responses:
        '200':
          description: List of available bot identifiers.
          content:
            application/json:
              schema:
                type: object
                properties:
                  botModes:
                    type: array
                    items:
                      type: string
                    example: ["random_bot", "intermediate_bot", "hard_bot"]
        '500':
          description: Internal server error.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Error obteniendo modos de bot

  /api/game/start:
    post:
      summary: Start a new game session.
      operationId: startGame
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - gameMode
              properties:
                gameMode:
                  type: string
                  enum: [vsBot, multiplayer, online]
                  example: vsBot
                botMode:
                  type: string
                  enum: [random_bot, intermediate_bot, hard_bot]
                  example: random_bot
                boardSize:
                  type: integer
                  enum: [8, 11, 15, 19]
                  default: 11
                  example: 11
      responses:
        '200':
          description: Game started successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  gameId:
                    type: string
                    example: game_1713000000000_abc123
                  board:
                    type: array
                    items:
                      type: object
                  players:
                    type: array
                    items:
                      type: object
                  turn:
                    type: string
                    example: j1
                  status:
                    type: string
                    example: active
        '401':
          description: Unauthorized.
        '500':
          description: Internal server error.

  /api/game/{gameId}:
    get:
      summary: Get the current state of a game.
      operationId: getGameState
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: gameId
          required: true
          schema:
            type: string
          example: game_1713000000000_abc123
      responses:
        '200':
          description: Current game state.
          content:
            application/json:
              schema:
                type: object
                properties:
                  gameId:
                    type: string
                    example: game_1713000000000_abc123
                  board:
                    type: array
                    items:
                      type: object
                  players:
                    type: array
                    items:
                      type: object
                  moves:
                    type: array
                    items:
                      type: string
                  turn:
                    type: string
                    example: j1
                  status:
                    type: string
                    example: active
                  winner:
                    type: string
                    nullable: true
                    example: null
        '401':
          description: Unauthorized.
        '404':
          description: Game not found.
        '500':
          description: Internal server error.

  /api/game/{gameId}/setPlayerName:
    post:
      summary: Set the real name of a player in an online game.
      operationId: setPlayerName
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: gameId
          required: true
          schema:
            type: string
          example: game_1713000000000_abc123
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role
                - name
              properties:
                role:
                  type: string
                  enum: [j1, j2]
                  example: j1
                name:
                  type: string
                  example: Jorge
      responses:
        '200':
          description: Player name updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        '401':
          description: Unauthorized.
        '404':
          description: Game not found.

  /api/game/{gameId}/saveForPlayer:
    post:
      summary: Save an online game in a specific player's history.
      operationId: saveForPlayer
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: gameId
          required: true
          schema:
            type: string
          example: game_1713000000000_abc123
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
              properties:
                userId:
                  type: string
                  example: 65f756db3fa22d227a4b7c7d
                winner:
                  type: string
                  example: j1
                playerNames:
                  type: array
                  items:
                    type: string
                  example: ["Jorge", "Rival"]
      responses:
        '200':
          description: Game saved successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        '400':
          description: Missing userId.
        '401':
          description: Unauthorized.
        '500':
          description: Internal server error.

  /api/game/{gameId}/validateMove:
    post:
      summary: Make a player move.
      description: >
        Applies the human player's move to the game. This is the main endpoint to use during a game turn.
        After a successful call the turn advances automatically (j1 → j2 or j2 → j1).
        If `winner` is non-null the game is over.
      operationId: validateMove
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: gameId
          required: true
          schema:
            type: string
          example: game_1713000000000_abc123
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - move
              properties:
                move:
                  type: string
                  description: Cell position in (x,y,z) format.
                  example: (1,1,0)
      responses:
        '200':
          description: Move applied successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                    example: true
                  winner:
                    type: string
                    nullable: true
                    example: null
                  status:
                    type: string
                    example: active
        '400':
          description: Invalid move.
        '401':
          description: Unauthorized.
        '404':
          description: Game not found.

  /api/game/history:
    get:
      summary: Get the authenticated user's game history.
      operationId: getHistory
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of finished games for the user.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    gameId:
                      type: string
                    gameMode:
                      type: string
                    boardSize:
                      type: integer
                    winner:
                      type: string
                    createdAt:
                      type: string
                      format: date-time
                    finishedAt:
                      type: string
                      format: date-time
        '401':
          description: Unauthorized.
        '500':
          description: Internal server error.

# This is the security scheme for JWT authentication. It defines how the authentication should be done in the API.
# The bearerAuth scheme is used to indicate that the API uses JWT (JSON Web Token) tokens for authentication.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT