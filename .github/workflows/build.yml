name: Build

on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  node-services:
    name: Node Services
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - name: authservice
            path: users/authservice
            test: true
          - name: userservice
            path: users/userservice
            test: true
          - name: friends
            path: friends
            test: true
          - name: game
            path: game
            test: true
          - name: gateway
            path: gateway
            test: true
          - name: webapp
            path: webapp
            test: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.service.path }}/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ matrix.service.path }}

      - name: Run unit tests
        if: ${{ matrix.service.test == true }}
        run: npm test
        working-directory: ${{ matrix.service.path }}

      - name: Run webapp unit tests
        if: ${{ matrix.service.name == 'webapp' }}
        run: npm run test:coverage
        working-directory: webapp

      - name: Build webapp
        if: ${{ matrix.service.name == 'webapp' }}
        run: npm run build
        working-directory: webapp

  rust-service:
    name: Rust Service
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            gamey/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('gamey/Cargo.lock') }}
          
      - name: Run gamey unit tests
        working-directory: gamey
        run: cargo test --locked

      - name: Build gamey
        working-directory: gamey
        run: cargo build --release

  webapp-e2e:
    name: Webapp E2E
    runs-on: ubuntu-latest
    needs:
      - node-services
      - rust-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: webapp/package-lock.json

      - name: Install webapp dependencies
        run: npm ci
        working-directory: webapp

      - name: Start backend stack for E2E
        run: docker compose up -d --build mongodb authservice userservice friends gamey game gateway

      - name: Wait for gateway to be ready
        run: |
          for i in {1..30}; do
            if curl -k -fsS https://localhost:8000/health > /dev/null; then
              exit 0
            fi
            sleep 5
          done
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: webapp

      - name: Run webapp E2E tests
        run: npx start-server-and-test "npm run dev -- --host 127.0.0.1 --strictPort" https-get://127.0.0.1:5173 "npm run test:e2e:run"
        working-directory: webapp
        env:
          VITE_API_URL: https://localhost:8000
          BASE_URL: https://127.0.0.1:5173

      - name: Stop backend stack
        if: always()
        run: docker compose down

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs:
      - node-services
      - rust-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install authservice dependencies
        run: npm ci
        working-directory: users/authservice

      - name: Run authservice tests with coverage
        run: npm test
        working-directory: users/authservice

      - name: Install userservice dependencies
        run: npm ci
        working-directory: users/userservice

      - name: Run userservice tests with coverage
        run: npm test
        working-directory: users/userservice

      - name: Install friends dependencies
        run: npm ci
        working-directory: friends

      - name: Run friends tests with coverage
        run: npm test
        working-directory: friends

      - name: Install game dependencies
        run: npm ci
        working-directory: game

      - name: Run game tests with coverage
        run: npm test
        working-directory: game

      - name: Install gateway dependencies
        run: npm ci
        working-directory: gateway

      - name: Run gateway tests with coverage
        run: npm test
        working-directory: gateway

      - name: Install webapp dependencies
        run: npm ci
        working-directory: webapp

      - name: Run webapp tests with coverage
        run: npm run test:coverage
        working-directory: webapp

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs:
      - node-services
      - rust-service
      - webapp-e2e
      - sonarcloud

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docker compose
        run: docker compose config

      - name: Build local images
        run: docker compose build
